<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraPhotoStudio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            📸 TeraPhotoStudio
        </span>
    </div>
</nav>

<section class="hero text-center">

    <div class="container">

        <h1 class="display-4">
            Professional Passport Photo Studio
        </h1>

        <p class="lead">
            Developed by Terasync Tech
        </p>

        <button class="btn btn-primary btn-lg mt-3">
            Get Started
        </button>

    </div>

</section>

<section class="container mt-5">

<div class="row g-4">

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">
<i class="fa-solid fa-camera fa-3x text-primary"></i>
<h5 class="mt-3">Passport Photos</h5>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">
<i class="fa-solid fa-passport fa-3x text-success"></i>
<h5 class="mt-3">Visa Photos</h5>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">
<i class="fa-solid fa-id-card fa-3x text-danger"></i>
<h5 class="mt-3">PVC Cards</h5>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">
<i class="fa-solid fa-print fa-3x text-warning"></i>
<h5 class="mt-3">Print</h5>
</div>
</div>
</div>

</div>

</section>

<footer class="bg-dark text-white text-center p-3 mt-5">

© 2026 Terasync Tech

</footer>

</body>
</html>
